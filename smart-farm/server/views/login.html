<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm - เข้าสู่ระบบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 50%, #40916c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 44px 40px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        .farm-logo {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-6px); }
        }

        .login-title {
            text-align: center;
            color: #1a472a;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-subtitle {
            text-align: center;
            color: #888;
            font-size: 0.88rem;
            margin-bottom: 28px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1.5px solid #ddd;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #1a472a, #2d6a4f);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(26, 71, 42, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: #fff3f3;
            border: 1px solid #f5c6c6;
            color: #c0392b;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.88rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-text {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.78rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="farm-logo">🌱</div>
            <h1 class="login-title">Smart Farm</h1>
            <p class="login-subtitle">ระบบปลูกผักอัตโนมัติ</p>

            <div id="error-box" class="error-msg" style="display:none;">
                ⚠️ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
            </div>

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">ชื่อผู้ใช้</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="กรอกชื่อผู้ใช้"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>
                <div class="mb-3">
                    <label class="form-label">รหัสผ่าน</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="กรอกรหัสผ่าน"
                        autocomplete="current-password"
                        required
                    >
                </div>
                <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
            </form>
        </div>
        <p class="footer-text">Smart Farm Dashboard v1.0</p>
    </div>

    <script>
        if (new URLSearchParams(window.location.search).get('error')) {
            document.getElementById('error-box').style.display = 'flex';
        }
    </script>
</body>
</html>
